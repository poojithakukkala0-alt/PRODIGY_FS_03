<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart | Access Account</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body style="background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
    
    <div class="auth-box">
        <div style="text-align: center; margin-bottom: 25px; cursor: pointer;" onclick="location.href='index.html'">
            <span style="font-size: 2.5rem;">🌿</span>
            <h2 style="color: var(--brand-dark-green); font-size: 1.8rem; font-weight: 700;">Fresh<span>Mart</span></h2>
        </div>
        
        <h2>Welcome Back</h2>
        <p>Log into your secure FreshMart grocery portal</p>
        
        <form id="login-form" onsubmit="handleAuthLogin(event)">
            <div class="auth-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="name@domain.com">
            </div>
            <div class="auth-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="auth-action-btn">Sign In</button>
        </form>
        <p class="auth-toggle">New to FreshMart? <a href="register.html">Create an Account</a></p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
