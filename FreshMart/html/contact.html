<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart | Customer Care Support</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="header-container"><div class="logo-area" onclick="location.href='index.html'" style="cursor:pointer"><span class="logo-icon">🌿</span><h1 class="logo-text">Fresh<span>Mart</span></h1></div></div>
    </header>
    <main style="max-width:600px; margin:50px auto; padding:20px; background:#fff; border-radius:16px; border:1px solid #eee">
        <h2>Contact Our Customer Support Desk</h2>
        <form onsubmit="alert('Support query ticket transmitted successfully!'); event.preventDefault(); location.href='index.html'" style="display:flex; flex-direction:column; gap:15px; margin-top:20px">
            <input type="text" placeholder="Your Name" required style="padding:12px; border:1px solid #ddd; border-radius:8px">
            <input type="email" placeholder="Your Email Address" required style="padding:12px; border:1px solid #ddd; border-radius:8px">
            <textarea placeholder="How can we assist you today regarding deliveries or products?" rows="5" required style="padding:12px; border:1px solid #ddd; border-radius:8px; font-family:inherit"></textarea>
            <button type="submit" style="background:#064e3b; color:white; border:none; padding:14px; font-weight:600; border-radius:8px; cursor:pointer">Submit Ticket</button>
        </form>
    </main>
</body>
</html>
