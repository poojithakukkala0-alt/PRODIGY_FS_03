<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart | Secure Checkout Gateway</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/checkout.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <main class="checkout-wrapper">
        <form class="checkout-form" onsubmit="processOrder(event)">
            <h2>Delivery Address & Payment Details</h2>
            <div class="form-group"><label>Full Name</label><input type="text" required placeholder="Enter your full name"></div>
            <div class="form-group"><label>Delivery Address</label><input type="text" required placeholder="Flat, House no., Apartment, Street address"></div>
            <div class="form-row">
                <div class="form-group"><label>City</label><input type="text" required placeholder="e.g. Mumbai"></div>
                <div class="form-group"><label>Pincode</label><input type="text" required pattern="[0-9]{6}" placeholder="6-digit postal code"></div>
            </div>
            
            <h3>Select Payment Method</h3>
            <div class="payment-options">
                <label class="radio-label"><input type="radio" name="payment" checked> Cash on Delivery (COD)</label>
                <label class="radio-label"><input type="radio" name="payment"> UPI / Netbanking Mockway</label>
            </div>
            <button type="submit" class="place-order-btn">Place Order Securely</button>
        </form>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/checkout.js"></script>
</body>
</html>
