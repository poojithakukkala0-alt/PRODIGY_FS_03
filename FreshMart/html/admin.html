<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart Admin | Central Inventory CRUD Desk</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/checkout.css">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        .admin-layout { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 400px 1fr; gap: 40px; }
        .crud-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        .crud-table th, .crud-table td { padding: 12px; border: 1px solid var(--border-color); text-align: left; }
        .crud-table th { background: var(--brand-dark-green); color: white; }
        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.8rem; margin-right: 5px; }
        .edit-btn { background: #fde047; color: var(--brand-dark-green); }
        .delete-btn { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo-area" onclick="location.href='index.html'" style="cursor:pointer">
                <span class="logo-icon">🌿</span><h1 class="logo-text">Fresh<span>Mart Admin</span></h1>
            </div>
            <a href="index.html" class="action-item">🏠 Return to Marketplace Home</a>
        </div>
    </header>

    <main class="admin-layout">
        <!-- CREATE & UPDATE Form Panel -->
        <section class="checkout-form" style="padding: 25px; align-self: start; position: sticky; top: 110px;">
            <h2 id="form-heading">Create New Product</h2>
            <p id="form-subheading" style="font-size:0.8rem; margin-bottom:20px; text-align:left; color:#666;">Add items directly into your local storage dataset repository.</p>
            
            <form id="crud-form" onsubmit="handleFormSubmission(event)">
                <input type="hidden" id="product-idx"> 
                
                <div class="form-group">
                    <label>Product Title Name</label>
                    <input type="text" id="prod-name" required placeholder="e.g., Farm Fresh Eggs">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category (dairy / fruits / vegetables)</label>
                        <input type="text" id="prod-cat" required placeholder="dairy">
                    </div>
                    <div class="form-group">
                        <label>Product Image URL</label>
                        <input type="url" id="prod-emoji" required placeholder="https://unsplash.com...">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Price Value (₹)</label>
                        <input type="number" id="prod-price" required placeholder="80">
                    </div>
                    <div class="form-group">
                        <label>Unit/Pack Metrics</label>
                        <input type="text" id="prod-unit" required placeholder="Pack of 6">
                    </div>
                </div>
                <div class="form-group">
                    <label>Short Product Description</label>
                    <input type="text" id="prod-desc" required placeholder="High-protein, farm-raised organic eggs...">
                </div>
                <button type="submit" id="submit-action-btn" class="place-order-btn">Save Product Item</button>
                <button type="button" id="cancel-edit-btn" onclick="resetFormState()" style="display:none; width:100%; margin-top:10px; background:#e5e7eb; border:none; padding:12px; border-radius:8px; cursor:pointer;">Cancel Edit Mode</button>
            </form>
        </section>

        <!-- READ, LIST & DELETE Inventory Log Panel -->
        <section style="background:#fff; border:1px solid var(--border-color); border-radius:20px; padding:30px;">
            <h2 style="font-size:1.4rem; color:var(--brand-dark-green)">Current Database Catalog Ledger</h2>
            <table class="crud-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Unit</th>
                        <th>Manage Operations</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    <!-- Rows populated systematically by your JavaScript -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="../data/products.js"></script>
    <script src="../js/storage.js"></script>
    <script>
        if (!localStorage.getItem('freshmart_db_products')) {
            localStorage.setItem('freshmart_db_products', JSON.stringify(typeof productsData !== 'undefined' ? productsData : []));
        }

        let database = JSON.parse(localStorage.getItem('freshmart_db_products')) || [];

        window.addEventListener('DOMContentLoaded', () => {
            renderAdminInventoryTable();
        });

        function renderAdminInventoryTable() {
            const tableBody = document.getElementById('admin-table-body');
            if(!tableBody) return;
            
            if(database.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#666;">No items in the database yet. Add one on the left!</td></tr>`;
                return;
            }

            tableBody.innerHTML = database.map((item, index) => `
                <tr>
                    <td>
                        <div style="display:flex; align-items:center; gap:10px;">
                            ${item.emoji && item.emoji.startsWith('http') ? 
                                `<img src="${item.emoji}" style="width:35px; height:35px; object-fit:cover; border-radius:4px; border:1px solid #ddd;">` : 
                                `<span style="font-size:1.3rem;">${item.emoji || '📦'}</span>`
                            }
                            <strong>${item.name}</strong>
                        </div>
                    </td>
                    <td><span class="product-badge badge-fresh" style="font-size:0.7rem">${item.category}</span></td>
                    <td><strong>₹${item.price}</strong></td>
                    <td><span style="color:#666">${item.unit}</span></td>
                    <td>
                        <button class="action-btn edit-btn" onclick="prepareUpdateItem(${index})">Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteProductItem(${index})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function handleFormSubmission(event) {
            event.preventDefault();

            const idx = document.getElementById('product-idx').value;
            const newProductObj = {
                id: idx !== "" ? database[idx].id : "p-" + Math.floor(1000 + Math.random() * 9000),
                name: document.getElementById('prod-name').value,
                category: document.getElementById('prod-cat').value.toLowerCase().trim(),
                emoji: document.getElementById('prod-emoji').value,
                price: parseFloat(document.getElementById('prod-price').value),
                unit: document.getElementById('prod-unit').value,
                badge: idx !== "" ? database[idx].badge : "New",
                badgeClass: idx !== "" ? database[idx].badgeClass : "badge-fresh",
                description: document.getElementById('prod-desc').value
            };

            if (idx === "") {
                database.push(newProductObj);
                alert(`Added "${newProductObj.name}" to inventory!`);
            } else {
                database[idx] = newProductObj;
                alert(`Updated parameters for "${newProductObj.name}"!`);
            }

            localStorage.setItem('freshmart_db_products', JSON.stringify(database));
            resetFormState();
            renderAdminInventoryTable();
        }

        function prepareUpdateItem(index) {
            const target = database[index];
            document.getElementById('product-idx').value = index;
            document.getElementById('prod-name').value = target.name;
            document.getElementById('prod-cat').value = target.category;
            document.getElementById('prod-emoji').value = target.emoji;
            document.getElementById('prod-price').value = target.price;
            document.getElementById('prod-unit').value = target.unit;
            document.getElementById('prod-desc').value = target.description;

            document.getElementById('form-heading').innerText = "Update Existing Product";
            document.getElementById('submit-action-btn').innerText = "Apply Custom Updates";
            document.getElementById('cancel-edit-btn').style.display = "block";
        }

        function deleteProductItem(index) {
            if (confirm(`Are you sure you want to delete "${database[index].name}" permanently?`)) {
                database.splice(index, 1);
                localStorage.setItem('freshmart_db_products', JSON.stringify(database));
                renderAdminInventoryTable();
            }
        }

        function resetFormState() {
            document.getElementById('crud-form').reset();
            document.getElementById('product-idx').value = "";
            document.getElementById('form-heading').innerText = "Create New Product";
        }
