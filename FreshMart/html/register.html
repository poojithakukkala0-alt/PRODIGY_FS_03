<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart | Register Account</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body style="background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
    
    <div class="auth-box">
        <div style="text-align: center; margin-bottom: 25px; cursor: pointer;" onclick="location.href='index.html'">
            <span style="font-size: 2.5rem;">🌿</span>
            <h2 style="color: var(--brand-dark-green); font-size: 1.8rem; font-weight: 700;">Fresh<span>Mart</span></h2>
        </div>
        
        <h2>Create Account</h2>
        <p>Join us to order farm-fresh goods instantly</p>
        
        <form id="register-form" onsubmit="handleAuthRegister(event)">
            <div class="auth-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" required placeholder="First and last name">
            </div>
            <div class="auth-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" required placeholder="name@domain.com">
            </div>
            <div class="auth-group">
                <label>Create Password</label>
                <input type="password" id="reg-password" required minlength="6" placeholder="Minimum 6 characters">
            </div>
            <button type="submit" class="auth-action-btn">Register Securely</button>
        </form>
        <p class="auth-toggle">Already have an account? <a href="login.html">Sign In</a></p>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
